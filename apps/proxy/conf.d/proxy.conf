server {
    listen 80;
    server_name proxy.sportsdey-server.adeaduratimilehin.workers.dev;

    set $proxy_secret $PROXY_SECRET;
    set $broadage_key $BROADAGE_API_KEY;

    location /health {
        add_header Content-Type application/json;
        return 200 '{"status":"ok"}';
    }

    location /broadage/ {
        if ($http_x_proxy_auth != $proxy_secret) {
            return 401;
        }

        rewrite ^/broadage/(.*)$ /$1 break;
        proxy_pass https://s0-sports-data-api.broadage.com;

        proxy_set_header Ocp-Apim-Subscription-Key $broadage_key;
        proxy_set_header languageId "2";
        proxy_set_header Accept "application/json";

        proxy_set_header X-Forwarded-For "";
        proxy_set_header X-Real-IP "";
        proxy_set_header Authorization "";

        proxy_http_version 1.1;
        proxy_ssl_server_name on;

        proxy_connect_timeout 5s;
        proxy_read_timeout 10s;
    }
}
